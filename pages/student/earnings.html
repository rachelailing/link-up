<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Earning History — Link Up</title>

    <link rel="stylesheet" href="/css/main.css" />
  </head>

  <body>
    <div class="app">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="logo">
          <img src="../../assets/images/link_up_icon.jpeg" alt="Link Up" />
          <div class="logo-title">Link <span>Up</span></div>
        </div>

        <nav class="nav">
          <a data-nav href="marketplace.html">🏠 Home Page</a>
          <a data-nav href="earnings.html" class="active">💰 Earning History</a>
          <a data-nav href="purchase.html">🛍️ Purchase History</a>

          <div class="nav-logout">
            <a href="#" id="logoutBtn">🚪 Logout</a>
          </div>
        </nav>
      </aside>

      <!-- Topbar -->
      <header class="topbar">
        <div class="topbar-nav">
          <a href="job-section.html" class="topbar-nav-link">Job Section</a>
          <a href="marketplace.html" class="topbar-nav-link active">Marketplace Section</a>
        </div>

        <div style="display: flex; gap: 10px">
          <button class="btn btn-outline">🔔</button>
          <button class="btn btn-blue">My Profile</button>
        </div>
      </header>

      <!-- Main -->
      <main class="main">
        <div class="container">
          <div class="section-title">
            <h2>Earning History</h2>
          </div>

          <div class="card pad">
            <p class="muted">You haven't earned anything yet.</p>
          </div>

          <div style="height: 20px"></div>

          <!-- Example of how an earning might look -->
          <div class="list">
            <div
              class="card pad"
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 10px;
              "
            >
              <div>
                <h3 style="margin: 0">Logo Design for Tech Startup</h3>
                <p class="muted" style="margin: 4px 0 0 0">Earned on: 2026-03-01</p>
              </div>
              <div style="text-align: right">
                <div style="font-weight: bold; color: green">+ RM 250.00</div>
                <span class="badge refunded">Received</span>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script type="module">
      import { setActiveNav, wireLogout } from '/js/components/navbar.js';
      document.addEventListener('DOMContentLoaded', () => {
        setActiveNav();
        wireLogout();
      });
    </script>
  </body>
</html>
