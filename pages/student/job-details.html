<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Job Details — Link Up</title>

  <link rel="stylesheet" href="../../css/main.css" />
</head>

<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <img src="../../assets/images/link_up_icon.jpeg" alt="Link Up">
        <div class="logo-title">Link <span>Up</span></div>
      </div>

      <nav class="nav">
        <a data-nav href="job-section.html">🏠 Home Page</a>
        <a data-nav href="job-details.html" class="active">✅ Job Details</a>
        <a data-nav href="trans-details.html">💳 Transaction Details</a>
      </nav>
    </aside>

    <!-- Topbar -->
    <header class="topbar">
      <div style="font-weight:800;">Job Details</div>
      <button class="btn btn-blue">My Profile</button>
    </header>

    <!-- Main -->
    <main class="main">
      <div class="container">

        <div class="section-title">
          <h2>My Jobs</h2>
          <span class="badge inprogress" id="activeCountBadge">0 Active</span>
        </div>

        <!-- Filters -->
        <div class="card pad filter-bar">
          <input id="searchInput" type="text" placeholder="Search by job title..." />

          <select id="statusFilter">
            <option value="all">All Status</option>
            <option value="applied">Applied</option>
            <option value="current">Current</option>
            <option value="done">Done</option>
            <option value="cancelled">Cancelled</option>
          </select>

          <select id="dateFilter">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
          </select>
        </div>

        <div style="height:20px;"></div>

        <div id="activeJobsList" class="list"></div>

      </div>
    </main>

  </div>

  <script type="module" src="../../js/pages/student/job-details.js"></script>
</body>
</html>
