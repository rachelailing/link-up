<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Job Earnings — Link Up</title>
  <link rel="stylesheet" href="../../css/main.css" />
</head>
<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <img src="../../assets/images/link_up_icon.jpeg" alt="Link Up">
        <div class="logo-title">Link <span>Up</span></div>
      </div>

      <nav class="nav">
        <a data-nav href="job-section.html">🏠 Home Page</a>
        <a data-nav href="jobs.html">🔍 Job Details</a>
        <a data-nav href="job-earnings.html" class="active">💰 Transaction Details</a>

        <div class="nav-logout">
          <a href="#" id="logoutBtn">🚪 Logout</a>
        </div>
      </nav>
    </aside>

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-nav">
        <a href="job-section.html" class="topbar-nav-link active">Job Section</a>
        <a href="marketplace.html" class="topbar-nav-link">Marketplace Section</a>
      </div>

      <div style="display:flex; gap:10px;">
        <button class="btn btn-outline">🔔</button>
        <button class="btn btn-blue" onclick="window.location.href='profile.html'">My Profile</button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main">
      <div class="container">
        <div class="section-title">
          <h2>Job Earnings</h2>
        </div>

        <!-- Summary Cards -->
        <div class="grid cols-3">
          <div class="card pad">
            <h3>Total Earned</h3>
            <p id="totalEarned" style="font-size: 1.5rem; font-weight: bold; color: var(--primary-color);">RM 350.00</p>
          </div>
          <div class="card pad">
            <h3>Pending Release</h3>
            <p id="pendingRelease" style="font-size: 1.5rem; font-weight: bold; color: #B45309;">RM 365.00</p>
          </div>
          <div class="card pad">
            <h3>Completed Gigs</h3>
            <p id="completedGigs" style="font-size: 1.5rem; font-weight: bold;">3</p>
          </div>
        </div>

        <div style="height:32px;"></div>

        <div class="section-title">
          <h2>Transaction History</h2>
        </div>

        <!-- Filters -->
        <div class="card pad filter-bar" style="display: flex; gap: 10px; margin-bottom: 20px;">
          <select id="typeFilter" class="btn btn-outline" style="text-align: left; flex: 1;">
            <option value="all">All Types</option>
            <option value="commitment">Commitment Fee</option>
            <option value="salary">Salary</option>
            <option value="both">Commitment + Salary</option>
          </select>

          <select id="statusFilter" class="btn btn-outline" style="text-align: left; flex: 1;">
            <option value="all">All Status</option>
            <option value="unpaid">Unpaid</option>
            <option value="refund">Refund</option>
            <option value="pending">Pending</option>
            <option value="released">Released</option>
            <option value="cancel">Cancel</option>
          </select>
        </div>

        <div class="list" id="earningsList">
          <!-- Dynamic transactions populated by earnings.js -->
        </div>

      </div>
    </main>
  </div>

  <script type="module" src="../../js/pages/student/earnings.js"></script>
</body>
</html>
