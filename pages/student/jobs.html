<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Job Details — Link Up</title>

  <link rel="stylesheet" href="../../css/main.css" />
</head>

<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <img src="../../assets/images/link_up_icon.jpeg" alt="Link Up">
        <div class="logo-title">Link <span>Up</span></div>
      </div>

      <nav class="nav">
        <a data-nav href="job-section.html">🏠 Home Page</a>
        <a data-nav href="jobs.html" class="active">🔍 Job Details</a>
        <a data-nav href="job-earnings.html">💰 Transaction Details</a>
        
        <div class="nav-logout">
          <a href="#" id="logoutBtn">🚪 Logout</a>
        </div>
      </nav>
    </aside>

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-nav">
        <a href="job-section.html" class="topbar-nav-link active">Job Section</a>
        <a href="marketplace.html" class="topbar-nav-link">Marketplace Section</a>
      </div>

      <div style="display:flex; gap:10px;">
        <button class="btn btn-outline">🔔</button>
        <button class="btn btn-blue" onclick="window.location.href='profile.html'">My Profile</button>
      </div>
    </header>

    <!-- Main -->
    <main class="main">
      <div class="container">

        <div class="section-title">
          <h2>My Jobs</h2>
        </div>

        <!-- Filters -->
        <div class="card pad filter-bar">
          <input id="searchInput" type="text" placeholder="Search by job title..." />

          <select id="statusFilter">
            <option value="all">All Status</option>
            <option value="applied">Applied</option>
            <option value="current">Current</option>
            <option value="done">Done</option>
            <option value="cancelled">Cancelled</option>
          </select>

          <select id="dateFilter">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
          </select>
        </div>

        <div style="height:20px;"></div>

        <div class="list" id="jobsList">
          <!-- Dynamic jobs will be appended here -->
        </div>

      </div>
    </main>

  </div>

  <!-- Job Details Modal -->
  <div class="modal-backdrop" id="jobDetailsModal">
    <div class="modal">
      <h2 id="modalJobTitle">Job Title</h2>
      <p id="modalEmployer" class="muted">Employer Name</p>
      
      <div style="margin: 16px 0; border-top: 1px solid var(--border); padding-top: 16px;">
        <p><strong>Location:</strong> <span id="modalLocation">Location</span></p>
        <p><strong>Salary:</strong> RM <span id="modalSalary">0</span></p>
        <p><strong>Category:</strong> <span id="modalCategory">Category</span></p>
        <p><strong>Status:</strong> <span id="modalStatusBadge" class="badge">Status</span></p>
      </div>

      <div style="margin: 16px 0;">
        <h3>Description</h3>
        <p id="modalDescription" style="line-height: 1.6;">Job description goes here...</p>
      </div>

      <div id="modalFeedbackSection" style="margin: 16px 0; padding: 16px; background: rgba(115,187,59,.08); border-radius: 12px; display: none;">
        <h3 style="margin-top: 0; color: #166534;">Employer Feedback</h3>
        <p><strong>Rating:</strong> <span id="modalRating" style="color: #f59e0b; font-size: 1.2rem;">⭐⭐⭐⭐⭐</span></p>
        <p id="modalComment" style="font-style: italic; color: #374151; margin-top: 8px;">"Great job!"</p>
      </div>

      <div class="modal-actions">
        <button class="btn btn-outline" data-modal-close="jobDetailsModal">Close</button>
      </div>
    </div>
  </div>

  <script type="module" src="../../js/pages/student/jobs.js"></script>
</body>
</html>
