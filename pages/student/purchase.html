<head>

<body>
  <div class="app">

    <!-- Sidebar -->

      <div class="logo">
        <img src="../../assets/images/link_up_icon.jpeg" alt="Link Up">

      <nav class="nav">

        <div class="list">

              <p class="muted" style="margin:4px 0 0 0;">Purchased on: 2026-03-04</p>
            </div>
            <div style="text-align: right;">
              <div style="font-weight: bold; color: var(--blue);">RM 45.00</div>

          </div>
