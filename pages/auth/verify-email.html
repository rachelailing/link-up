<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verify your email — Link Up</title>
  <link rel="stylesheet" href="../../css/main.css" />
</head>
<body class="auth-body">
  <header class="auth-top">
    <a class="auth-brand" href="../../index.html">
      <img src="../../assets/images/link_up_icon.jpeg" alt="Link Up icon" class="auth-logo">
      <span class="auth-brand__text">Link <b>Up</b></span>
    </a>
  </header>

  <main class="auth-wrap auth-wrap--center">
    <section class="auth-card card">
      <div class="auth-card__inner" style="text-align: center; padding: 40px 20px;">
        <div class="verify-icon" style="font-size: 64px; margin-bottom: 24px;">📧</div>
        <h1>Check your email</h1>
        <p class="auth-subtitle">
          We've sent a verification link to your email address.<br>
          Please click the link to activate your account.
        </p>

        <div style="margin-top: 32px; border-top: 1px solid #eee; padding-top: 24px;">
          <p style="color: #666; font-size: 0.9rem; margin-bottom: 16px;">
            Already verified?
          </p>
          <a href="./student-login.html" class="btn btn-primary btn-full">Go to Login</a>
        </div>

        <div class="auth-bottom" style="margin-top: 24px;">
          <span>Didn't receive the email?</span>
          <a href="#" id="resendEmail" style="text-decoration: underline;">Resend link</a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
