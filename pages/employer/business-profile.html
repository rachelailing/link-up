<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Business Profile — Link Up</title>

  <link rel="stylesheet" href="/css/main.css" />
  <style>
    .profile-grid {
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 30px;
    }
    .profile-avatar-wrap {
      text-align: center;
    }
    .profile-avatar {
      width: 120px;
      height: 120px;
      border-radius: 20px;
      background: #f0f0f0;
      margin: 0 auto 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      border: 2px dashed #ccc;
      color: #999;
    }
    .form-section {
      margin-bottom: 30px;
    }
    .form-section h3 {
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
  </style>
</head>

<body>
  <div class="app">

    <aside class="sidebar">
      <a href="employer_homepage.html" class="logo" style="text-decoration: none; color: inherit;">
        <img src="../../assets/images/link_up_icon.jpeg" alt="Link Up">
        <div class="logo-title">Link <span>Up</span></div>
      </a>
    </aside>

    <header class="topbar">
      <div class="topbar-title">
        Business Profile
      </div>
      <div class="topbar-actions">
        <button class="btn btn-primary" id="saveProfileBtn">Save Changes</button>
      </div>
    </header>

    <main class="main">
      <div class="container">
        
        <div class="profile-grid">
          
          <aside>
            <div class="card pad profile-avatar-wrap">
              <div class="profile-avatar">🏢</div>
              <button class="btn btn-outline btn-full">Upload Logo</button>
              <p class="small-note" style="margin-top:10px;">Max 2MB, JPG/PNG</p>
            </div>
          </aside>

          <section>
            <form id="profileForm">
              <div class="card pad form-section">
                <h3>Business Information</h3>
                <div class="grid cols-2">
                  <div class="field">
                    <label>Business Name</label>
                    <input type="text" id="businessName" placeholder="e.g. Acme Corp">
                  </div>
                  <div class="field">
                    <label>Business Type</label>
                    <select id="businessType">
                      <option value="SME">SME</option>
                      <option value="Enterprise">Enterprise</option>
                      <option value="Startup">Startup</option>
                      <option value="Personal">Personal</option>
                    </select>
                  </div>
                  <div class="field">
                    <label>Business Email</label>
                    <input type="email" id="businessEmail" readonly>
                    <small class="muted">Contact support to change email</small>
                  </div>
                  <div class="field">
                    <label>Business Phone</label>
                    <input type="text" id="businessPhone">
                  </div>
                </div>
                <div class="field">
                  <label>Business Address</label>
                  <textarea id="businessAddress" rows="3"></textarea>
                </div>
              </div>

              <div class="card pad form-section">
                <h3>Person In Charge (PIC)</h3>
                <div class="grid cols-2">
                  <div class="field">
                    <label>PIC Name</label>
                    <input type="text" id="picName">
                  </div>
                  <div class="field">
                    <label>PIC Role</label>
                    <input type="text" id="picRole">
                  </div>
                </div>
              </div>

              <div class="card pad form-section">
                <h3>Security</h3>
                <div class="field">
                  <label>Current Password</label>
                  <input type="password" placeholder="••••••••">
                </div>
                <button type="button" class="btn btn-outline">Change Password</button>
              </div>
            </form>
          </section>

        </div>

      </div>
    </main>

  </div>

  <script type="module" src="/js/pages/employer/business-profile.js"></script>
</body>
</html>
