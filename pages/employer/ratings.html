<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ratings & Reviews — Link Up</title>

    <link rel="stylesheet" href="../../css/main.css" />
  </head>

  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="logo">
          <img src="../../assets/images/link_up_icon.jpeg" alt="Link Up" />
          <div class="logo-title">Link <span>Up</span></div>
        </div>

        <nav class="nav">
          <a data-nav href="employer_homepage.html">🏠 Home Page</a>
          <a data-nav href="create-job.html">➕ Create Job</a>
          <a data-nav href="job-manage.html">📋 My Job Listings</a>
          <a data-nav href="applications.html">📨 Applications</a>

          <a data-nav href="ratings.html" class="active">⭐ Ratings</a>
        </nav>
      </aside>

      <header class="topbar">
        <div class="topbar-title">Ratings & Reviews</div>
        <div class="topbar-actions">
          <button class="btn btn-blue" onclick="window.location.href = 'business-profile.html'">
            Business Profile

        </div>

      <!-- Main -->
      <main class="main">
        <div class="container">
          <div class="card pad" style="margin-bottom: 24px; text-align: center">
            <h1 style="font-size: 3rem; margin: 0; color: var(--blue)">4.9</h1>
            <div style="font-size: 1.5rem; color: #f1c40f; margin: 10px 0">⭐⭐⭐⭐⭐</div>
            <p class="muted">Average Rating based on 12 reviews</p>
          </div>

          <div class="section-title">
            <h2>Student Reviews</h2>
          </div>

          <div id="ratingsList" class="list">
            <div class="loading">Loading reviews...</div>
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="../../js/pages/employer/ratings.js"></script>
