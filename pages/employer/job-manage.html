<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Jobs — Link Up</title>

  <link rel="stylesheet" href="../../css/main.css" />
</head>

<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <img src="../../assets/images/link_up_icon.jpeg" alt="Link Up">
        <div class="logo-title">Link <span>Up</span></div>
      </div>

      <nav class="nav">
        <a data-nav href="employer_homepage.html">🏠 Home Page</a>
        <a data-nav href="create-job.html">➕ Create Job</a>
        <a data-nav href="job-manage.html" class="active">📋 My Job Listings</a>
        <a data-nav href="applications.html">📨 Applications</a>
        <a data-nav href="payment-release.html">💳 Payments</a>
        <a data-nav href="ratings.html">⭐ Ratings</a>
      </nav>
    </aside>

    <!-- Topbar -->
    <header class="topbar">
      <div style="font-weight:800;">Manage Jobs</div>
      <div class="topbar-actions">
        <button class="btn btn-blue" onclick="window.location.href='business-profile.html'">Business Profile</button>
      </div>
    </header>

    <!-- Main -->
    <main class="main">
      <div class="container">

        <div class="section-title">
          <h2>Your Job Listings</h2>
          <a href="create-job.html" class="btn btn-primary">+ Create Job</a>
        </div>

        <div id="jobManageList" class="list"></div>

      </div>
    </main>

  </div>

  <!-- Manage Job Modal -->
  <div class="modal-backdrop" id="manageJobModal">
    <div class="modal">
      <h3>Manage Job: <span id="modalJobTitle">Job Title</span></h3>
      <p>Select a new status for this job or delete the listing.</p>

      <div style="margin-bottom:20px;">
        <label style="display:block; margin-bottom:8px; font-weight:600;">Update Status:</label>
        <select id="modalStatusSelect" class="input" style="width:100%;">
          <option value="Draft">Draft</option>
          <option value="Open">Open</option>
          <option value="In Progress">In Progress</option>
          <option value="Completed">Completed</option>
        </select>
      </div>

      <div class="modal-actions" style="justify-content:space-between;">
        <button class="btn btn-outline" id="modalDeleteBtn" style="color:var(--red); border-color:var(--red);">🗑️ Delete Job</button>
        <div style="display:flex; gap:10px;">
          <button class="btn btn-outline" data-modal-close="manageJobModal">Cancel</button>
          <button class="btn btn-primary" id="modalUpdateStatusBtn">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="../../js/pages/employer/job-manage.js"></script>
</body>
</html>
